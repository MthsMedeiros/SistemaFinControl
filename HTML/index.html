<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../src/output.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Orbitron:wght@400..900&display=swap"
        rel="stylesheet">
    <title>Dashboard</title>
</head>

<body class="flex justify-center font-['Inter']">
    <!-- Container principal: envolve todo o conteúdo da página -->
    <div class="border-2 w-full h-full">
        <!-- Cabeçalho: barra azul com título e bloco do usuário -->
        <header class="bg-[#2d61a4]">
            <!-- Linha do header: título (esquerda) e usuário (direita) -->
            <div class="p-6 pl-10 text-3xl flex justify-between">
                <!-- Título da página -->
                <h1 class="text-white mt-3">Dashboard</h1>

                <div class="">
                    <nav id="MenuSuperior" class="">
                        <ul class="h-30 gap-5 flex justify-center items-center">
                            <li><a href="./index.html" class="text-white hover:text-gray-300 text-lg">Dashboard</a></li>
                            <li><a href="./receitas.html" class="text-white hover:text-gray-300 text-lg">Receitas</a>
                            </li>
                            <li><a href="./despesas.html" class="text-white hover:text-gray-300 text-lg">Despesas</a>
                            </li>
                        </ul>
                    </nav>
                </div>
                <!-- Bloco do usuário: imagem e nome -->
                <div class="flex">
                    <img src="../img/images.jpg" alt="imgUser" class="w-16 h-16 rounded-full" />
                    <h1 class="text-white mt-3 ml-5">Matheus Medeiros</h1>
                </div>

            </div>
        </header>


        <main class="bg-[#e5e7ed] min-h-screen  flex flex-col justify-start items-center ">
            <div class=" mt-20">
                <form action="">
                    <div>
                        <label for="mesAnoInput" class="flex">
                            <input type="month" class="border-2 rounded-lg p-2 mb-5 bg-white" id="mesAnoInput">
                            <div class="ml-3 h-5 mt-3 flex items-center justify-center bg-[#2d61a4] text-white rounded-lg cursor-pointer hover:size-6" onclick="gerarGraficosDespesas(), gerarGraficosReceitas(), gerarGraficoBarras()">
                                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                                    stroke="currentColor" class="size-5 hover:size-10">
                                    <path stroke-linecap="round" stroke-linejoin="round"
                                        d="M19.5 12c0-1.232-.046-2.453-.138-3.662a4.006 4.006 0 0 0-3.7-3.7 48.678 48.678 0 0 0-7.324 0 4.006 4.006 0 0 0-3.7 3.7c-.017.22-.032.441-.046.662M19.5 12l3-3m-3 3-3-3m-12 3c0 1.232.046 2.453.138 3.662a4.006 4.006 0 0 0 3.7 3.7 48.656 48.656 0 0 0 7.324 0 4.006 4.006 0 0 0 3.7-3.7c.017-.22.032-.441.046-.662M4.5 12l3 3m-3-3-3 3" />
                                </svg>
                                
                            </div>

                        </label>
                    </div>

                </form>
            </div>
            <div class=" w-350  grid grid-cols-3 gap-4 place-items-center">
                <div class="p-0 m-0 w-100 h-115 bg-white rounded-lg">
                    <h2
                        class="bg-[#2d61a4] text-white rounded-lg border text-lg font-bold mb-2 flex justify-center items-center">
                        Gráfico de Despesas</h2>
                    <canvas id="graficoDespesas" class="w-full h-full"></canvas>
                </div>
                <div class="p-0 m-0 w-100 h-115 bg-white rounded-lg">
                    <h2
                        class="bg-[#2d61a4] text-white rounded-lg border text-lg font-bold mb-2 flex justify-center items-center">
                        Gráfico de Receitas</h2>
                    <canvas id="graficoReceitas" class="w-full h-full"></canvas>
                </div>
                <div class="p-0 m-0 w-100 h-115 bg-white rounded-lg">
                    <h2
                        class="bg-[#2d61a4] text-white rounded-lg border text-lg font-bold mb-2 flex justify-center items-center">
                        Gráfico de Balanço</h2>
                    <canvas id="graficoBalanco" class="w-full pb-10"></canvas>
                </div>


            </div>
        </main>
    </div>
</body>
<script src="../scripts/dashboard.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</html>
